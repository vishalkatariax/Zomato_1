services:
  - type: web
    name: restaurant-recommendation-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
    autoDeploy: true
    disk:
      name: restaurant-data
      mountPath: /app/data
      sizeGB: 1
